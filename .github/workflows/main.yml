name: CI/CD - Payment Reminder (Laravel + React)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Frontend (React + Vite)
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # -----------------------------
      # Backend (Laravel)
      # -----------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath
          coverage: none

      - name: Install backend dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

  deploy:
    name: Deploy to Production (Rocky Linux)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -e
            echo "====================================="
            echo "🚀 Deploying Payment Reminder"
            echo "====================================="

            PROJECT_DIR="/home/dpd/payment_reminder/Payment-Reminder"

            if sudo -n true 2>/dev/null; then
              SUDO="sudo -n"
              echo "✅ Passwordless sudo available"
            else
              SUDO=""
              echo "⚠️ Passwordless sudo not available; running deploy without privileged operations"
            fi

            # Ensure the runner user owns the project files to allow git operations
            if [ -n "$SUDO" ]; then
              $SUDO chown -R "$(whoami):$(whoami)" "$PROJECT_DIR" || true
            fi

            cd $PROJECT_DIR

            echo "📥 Pulling latest code"
            git fetch origin
            git reset --hard origin/main

            # -----------------------------
            # Backend (Laravel)
            # -----------------------------
            echo "📦 Installing Laravel dependencies"
            cd backend
            composer install --no-dev --optimize-autoloader

            echo "⚙️ Running Laravel optimizations"
            php artisan migrate --force
            php artisan config:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:clear

            echo "🔐 Fixing permissions"
            if [ -n "$SUDO" ]; then
              $SUDO chown -R "$(whoami):$(whoami)" storage bootstrap/cache || true
            fi
            find storage bootstrap/cache -type d -exec chmod 775 {} \;
            find storage bootstrap/cache -type f -exec chmod 664 {} \;

            # -----------------------------
            # Frontend (React)
            # -----------------------------
            echo "🏗️ Building React frontend"
            cd ../frontend
            npm install
            npm run build

            echo "🔐 Fixing frontend permissions"
            if [ -n "$SUDO" ]; then
              $SUDO chown -R nginx:nginx dist || true
            fi
            chmod -R 755 dist

            # -----------------------------
            # Restart Services
            # -----------------------------
            echo "🔄 Restarting PHP-FPM & Nginx"
            if [ -n "$SUDO" ]; then
              $SUDO systemctl restart php-fpm
              $SUDO systemctl reload nginx
            else
              echo "⚠️ Skipping service restart (no passwordless sudo)."
            fi

            echo "====================================="
            echo "✅ Deployment completed successfully!"
            echo "🌐 URL: https://dpdlab1.slt.lk:8666"
            echo "====================================="
